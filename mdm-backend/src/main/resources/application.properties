# Database — Railway provides PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:mdm_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server — Railway sets PORT env var
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,text/javascript,application/javascript
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
# Logging
logging.level.com.mdm=DEBUG

# APK provisioning: set this in Railway to serve APK from external storage (S3/R2/GitHub release)
# Example: app.apk.external-url=https://cdn.example.com/devora-mdm-latest.apk
app.apk.external-url=${APP_APK_EXTERNAL_URL:}

# AMAPI
# Set these in Railway environment variables for production
amapi.enterprise-name=${AMAPI_ENTERPRISE_NAME:}
amapi.policy-id=${AMAPI_POLICY_ID:}

# API auth used by Android client and admin API callers (HTTP Basic)
mdm.auth.device.username=${MDM_API_USERNAME:}
mdm.auth.device.password=${MDM_API_PASSWORD:}



# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
